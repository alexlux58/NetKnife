# ==============================================================================
# NETKNIFE - CD (deploy on push to main)
# ==============================================================================
# Tests → deploy infra (if backend/infra changed) → deploy frontend → smoke test
#
# Setup: docs/CICD.md
# ==============================================================================

name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_ENV_DIR: infra/envs/dev
  AWS_REGION: us-west-2
  NODE_VERSION: "22"
  TERRAFORM_VERSION: "1.9.8"

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            infra:
              - 'backend/**'
              - 'infra/**'
              - '.github/workflows/cd.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Frontend — install, lint, typecheck, test, build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit
          npm test
          npm run build

      - name: Backend — install and test
        working-directory: backend
        run: |
          npm ci
          npm test

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform — fmt and validate
        run: |
          terraform fmt -check -recursive infra/
          cd "$TF_ENV_DIR"
          terraform init -backend=false
          terraform validate

  deploy-infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/aws-auth
        with:
          aws_region: ${{ env.AWS_REGION }}
          role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Write terraform.tfvars from secret
        env:
          NETKNIFE_TFVARS: ${{ secrets.NETKNIFE_TFVARS }}
        run: bash infra/scripts/ci-write-tfvars.sh

      - name: Enable S3 remote backend (CI only)
        run: cp infra/envs/dev/backend.tf.example infra/envs/dev/backend.tf

      - name: Terraform init (remote state)
        working-directory: ${{ env.TF_ENV_DIR }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=netknife/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Install Lambda dependencies
        run: |
          bash infra/scripts/install-lambda-deps.sh
          bash infra/scripts/prepare-lambda-shared.sh

      - name: Terraform apply
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform apply -auto-approve -input=false

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [test, changes, deploy-infra]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true') &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/aws-auth
        with:
          aws_region: ${{ env.AWS_REGION }}
          role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Write terraform.tfvars from secret
        env:
          NETKNIFE_TFVARS: ${{ secrets.NETKNIFE_TFVARS }}
        run: bash infra/scripts/ci-write-tfvars.sh

      - name: Enable S3 remote backend (CI only)
        run: cp infra/envs/dev/backend.tf.example infra/envs/dev/backend.tf

      - name: Terraform init (read outputs)
        working-directory: ${{ env.TF_ENV_DIR }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=netknife/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Update frontend .env.production
        run: |
          cd "${{ github.workspace }}/${{ env.TF_ENV_DIR }}"
          python3 <<'PY'
          import pathlib
          import subprocess

          def out(key: str) -> str:
              return subprocess.check_output(
                  ["terraform", "output", "-raw", key], text=True
              ).strip()

          api = out("api_url")
          cog = out("cognito_domain_url")
          cid = out("client_id")
          iss = out("cognito_issuer")
          site = out("site_url")
          region = "${{ env.AWS_REGION }}"
          content = "\n".join([
              f"VITE_API_URL={api}",
              f"VITE_COGNITO_DOMAIN={cog}",
              f"VITE_COGNITO_CLIENT_ID={cid}",
              f"VITE_COGNITO_ISSUER={iss}",
              f"VITE_OIDC_REDIRECT_URI={site}/callback",
              f"VITE_OIDC_POST_LOGOUT_REDIRECT_URI={site}/login",
              f"VITE_REGION={region}",
              "VITE_DEV_BYPASS_AUTH=false",
              "",
          ])
          path = pathlib.Path("${{ github.workspace }}") / "frontend" / ".env.production"
          path.write_text(content, encoding="utf-8")
          print(f"Wrote {path}")
          PY

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          cd "${{ github.workspace }}/${{ env.TF_ENV_DIR }}"
          BUCKET=$(terraform output -raw bucket_name)
          CF_ID=$(terraform output -raw cloudfront_id)
          SITE_URL=$(terraform output -raw site_url)
          aws s3 sync "${{ github.workspace }}/frontend/dist/" "s3://${BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*"
          echo "Deployed to ${SITE_URL}"

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: needs.deploy-frontend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/aws-auth
        with:
          aws_region: ${{ env.AWS_REGION }}
          role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Write terraform.tfvars from secret
        env:
          NETKNIFE_TFVARS: ${{ secrets.NETKNIFE_TFVARS }}
        run: bash infra/scripts/ci-write-tfvars.sh

      - name: Enable S3 remote backend (CI only)
        run: cp infra/envs/dev/backend.tf.example infra/envs/dev/backend.tf

      - name: Check site responds
        working-directory: ${{ env.TF_ENV_DIR }}
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=netknife/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          SITE_URL=$(terraform output -raw site_url)
          CF_DOMAIN=$(terraform output -raw cloudfront_domain)
          for URL in "https://${CF_DOMAIN}" "${SITE_URL}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL" || echo "000")
            echo "${URL} → HTTP ${CODE}"
            if [ "$CODE" -ge 500 ] 2>/dev/null; then
              echo "Smoke test failed for ${URL}"
              exit 1
            fi
          done
