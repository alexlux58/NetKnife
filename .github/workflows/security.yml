# ==============================================================================
# NETKNIFE - SECURITY CHECKS
# ==============================================================================
# Runs on push/PR to main: secrets, dependency vulns, IaC misconfigs.
#
# Optional secrets: GITGUARDIAN_API_KEY, SNYK_TOKEN
# - npm audit, Checkov, and Trivy always fail the workflow on findings.
# - GitGuardian and Snyk fail only when their secrets are configured.
# ==============================================================================

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: Secrets (GitGuardian)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitGuardian ggshield
        uses: GitGuardian/ggshield-action@v1.26.0
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        continue-on-error: ${{ secrets.GITGUARDIAN_API_KEY == '' }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend
        run: npm ci && npm audit --audit-level=high
        working-directory: frontend

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/billing/package-lock.json

      - name: Audit backend (billing)
        run: npm ci && npm audit --audit-level=high
        working-directory: backend/functions/billing

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/cognito-triggers/package-lock.json

      - name: Audit backend (cognito-triggers)
        run: npm ci && npm audit --audit-level=high
        working-directory: backend/functions/cognito-triggers

  snyk-deps:
    name: Snyk (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Snyk – frontend
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/billing/package-lock.json

      - name: Snyk – backend billing
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: backend/functions/billing
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/cognito-triggers/package-lock.json

      - name: Snyk – backend cognito-triggers
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: backend/functions/cognito-triggers
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Skip Snyk dependency scan (SNYK_TOKEN not configured)
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not set; skipping Snyk dependency scans."

  snyk-iac:
    name: Snyk (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk IaC scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high infra/
      - name: Skip Snyk IaC scan (SNYK_TOKEN not configured)
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not set; skipping Snyk IaC scan."

  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov – Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          output_format: cli
          soft_fail: false
          framework: terraform
          skip_check: CKV_AWS_119,CKV_AWS_28

  trivy:
    name: Trivy (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
