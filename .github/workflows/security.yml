# ==============================================================================
# NETKNIFE - SECURITY CHECKS
# ==============================================================================
# Runs on push/PR to main: secrets, dependency vulns, IaC misconfigs.
#
# Optional secrets: GITGUARDIAN_API_KEY, SNYK_TOKEN
# ==============================================================================

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: Secrets (GitGuardian)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitGuardian ggshield
        uses: GitGuardian/ggshield-action@v1.26.0
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        continue-on-error: true

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend
        run: npm ci && npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/billing/package-lock.json

      - name: Audit backend (billing)
        run: npm ci && npm audit --audit-level=high
        working-directory: backend/functions/billing
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/cognito-triggers/package-lock.json

      - name: Audit backend (cognito-triggers)
        run: npm ci && npm audit --audit-level=high
        working-directory: backend/functions/cognito-triggers
        continue-on-error: true

  snyk-deps:
    name: Snyk (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Snyk – frontend
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/billing/package-lock.json

      - name: Snyk – backend billing
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: backend/functions/billing
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/cognito-triggers/package-lock.json

      - name: Snyk – backend cognito-triggers
        run: npm ci && npx snyk@latest test --severity-threshold=high
        working-directory: backend/functions/cognito-triggers
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  snyk-iac:
    name: Snyk (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk IaC scan
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high infra/
        continue-on-error: true

  checkov:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov – Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          output_format: cli
          soft_fail: true
          framework: terraform
          skip_check: CKV_AWS_119,CKV_AWS_28

  trivy:
    name: Trivy (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
        continue-on-error: true
