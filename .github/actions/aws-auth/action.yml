name: Configure AWS credentials
description: Use OIDC role or access keys for NetKnife deploy jobs

inputs:
  aws_region:
    description: AWS region
    required: true
  role_to_assume:
    description: IAM role ARN for OIDC (leave empty to use access keys)
    required: false
    default: ""
  aws_access_key_id:
    description: IAM access key (used when role_to_assume is empty)
    required: false
    default: ""
  aws_secret_access_key:
    description: IAM secret key (used when role_to_assume is empty)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Require AWS auth configuration
      shell: bash
      run: |
        if [ -z "${{ inputs.role_to_assume }}" ] && [ -z "${{ inputs.aws_access_key_id }}" ]; then
          echo "::error::CD requires AWS credentials. Set repository variable AWS_ROLE_TO_ASSUME (OIDC, recommended) or secrets AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY. See docs/CICD.md"
          exit 1
        fi

    - name: Configure AWS credentials (OIDC)
      if: inputs.role_to_assume != ''
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role_to_assume }}
        aws-region: ${{ inputs.aws_region }}

    - name: Configure AWS credentials (access keys)
      if: inputs.role_to_assume == ''
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
        aws-region: ${{ inputs.aws_region }}
